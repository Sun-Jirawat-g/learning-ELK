version: "3.8"

# Jenkins controller + (optional) agent for beginner learning.
# Start: docker compose up -d
# UI:    http://localhost:8080
# Init password: docker exec jenkins cat /var/jenkins_home/secrets/initialAdminPassword

services:
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: jenkins
    restart: unless-stopped
    user: root  # allow installing extra tools / mounting docker.sock
    ports:
      - "8080:8080"   # Web UI
      - "50000:50000" # JNLP agent port
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=true
      - TZ=Asia/Bangkok
    volumes:
      - jenkins_home:/var/jenkins_home
      # Mount host docker so pipelines can run `docker build`
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - jenkins-net

  # Optional dedicated agent (SSH). Comment out if not needed.
  jenkins-agent:
    image: jenkins/ssh-agent:latest-jdk17
    container_name: jenkins-agent
    restart: unless-stopped
    environment:
      # Public key set on Jenkins controller via "SSH Build Agents" plugin.
      - JENKINS_AGENT_SSH_PUBKEY=${JENKINS_AGENT_SSH_PUBKEY:-}
    volumes:
      - jenkins_agent_workdir:/home/jenkins/agent
    networks:
      - jenkins-net

volumes:
  jenkins_home:
    name: jenkins_home
  jenkins_agent_workdir:
    name: jenkins_agent_workdir

networks:
  jenkins-net:
    driver: bridge
